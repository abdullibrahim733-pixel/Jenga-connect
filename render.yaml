services:
  - type: web
    name: jenga-connect-api
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    releaseCommand: python manage.py migrate && python manage.py bootstrap_admin
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /api/health/
    autoDeploy: true

databases:
  - name: jenga_connect_db
    plan: free
    databaseName: jenga_connect
    user: jenga_connect
